# Railway configuration for the Backend service
# In Railway dashboard: set root directory to "." and Dockerfile path to "backend/Dockerfile"

[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"
buildDockerContext = "."

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
