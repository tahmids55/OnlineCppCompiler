services:
  # Backend API service
  - type: web
    name: cpworkspace-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 8080
      - key: ALLOWED_ORIGINS
        fromService:
          name: cpworkspace-frontend
          type: web
          property: host
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false

  # Frontend static site
  - type: web
    name: cpworkspace-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://cpworkspace-backend.onrender.com/api/*
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    envVars:
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_API_URL
        fromService:
          name: cpworkspace-backend
          type: web
          property: host
